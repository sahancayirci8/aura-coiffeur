<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Aura Coiffeur Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="app">

<header>

<div class="logo">

<h1>AURA</h1>

<span>COIFFEUR</span>

</div>

<div class="dateBox">

<div id="today"></div>

<div id="clock"></div>

</div>

</header>

<section class="welcomeCard">

<h2>Hoş Geldin 👋</h2>

<p>Bugünkü randevularını buradan yönetebilirsin.</p>

</section>

<section class="stats">

<div class="card">

<span>Bugünkü Randevu</span>

<h1 id="appointmentCount">0</h1>

</div>

<div class="card">

<span>Bekleyen</span>

<h1>0</h1>

</div>

<div class="card">

<span>Tamamlanan</span>

<h1>0</h1>

</div>

<div class="card">

<span>Günlük Ciro</span>

<h1>₺0</h1>

</div>

</section>

<section class="actions">

<button>➕ Yeni Randevu</button>

<button>📅 Takvim</button>

<button>👥 Müşteriler</button>

<button>💰 Kasa</button>

</section>

<section class="appointments">

<h2>Bugünkü Randevular</h2>

<div id="appointmentList">

<p>Henüz randevu bulunmuyor.</p>

</div>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
