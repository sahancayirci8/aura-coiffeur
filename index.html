<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Coiffeur VIP</title>
    <!-- Fontlar ve İkonlar -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Esas Firebase Kütüphaneleri -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background-color: #0f0e0c; color: #f5f5f5; min-height: 100vh; }
        
        .gold-text { color: #d4af37; }
        .app-container { display: flex; width: 100%; min-height: 100vh; flex-direction: column; }
        
        /* HEADER / NAVBAR */
        .top-navbar { background: #161411; border-bottom: 1px solid #25221a; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .top-navbar h1 { font-family: 'Cinzel', serif; font-size: 22px; color: #d4af37; letter-spacing: 2px; }
        .top-navbar span { font-size: 11px; background: #2ecc71; color: black; padding: 2px 8px; border-radius: 4px; font-weight: 600; }

        .main-content { flex: 1; padding: 20px; box-sizing: border-box; }
        
        /* PREMIUM CARDS */
        .premium-card { background: #1a1815; border: 1px solid #25221a; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .premium-card h2 { font-size: 16px; margin-bottom: 15px; border-bottom: 1px solid #25221a; padding-bottom: 8px; color: #d4af37; text-transform: uppercase; letter-spacing: 1px; }

        /* FORM */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background: #000; border: 1px solid #25221a; border-radius: 6px; color: #fff; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { border-color: #d4af37; outline: none; }

        .gold-btn { width: 100%; background: linear-gradient(135deg, #f3e0aa 0%, #d4af37 100%); color: #000; border: none; padding: 14px; font-weight: 600; border-radius: 6px; cursor: pointer; font-size: 14px; letter-spacing: 1px; transition: 0.2s; }
        .gold-btn:hover { opacity: 0.9; }

        /* TABLE */
        .table-responsive { width: 100%; overflow-x: auto; }
        .luxury-table { width: 100%; border-collapse: collapse; min-width: 600px; text-align: left; }
        .luxury-table th { background: #000; color: #d4af37; font-size: 12px; padding: 12px; border-bottom: 2px solid #25221a; }
        .luxury-table td { padding: 12px; border-bottom: 1px solid #25221a; font-size: 13.5px; }

        .whatsapp-btn { background: #2ecc71; color: black; border: none; padding: 6px 12px; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 12px; margin-right: 5px; }
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        .empty-text { text-align: center; padding: 30px; color: #777; font-style: italic; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- ÜST PANEL -->
        <div class="top-navbar">
            <div>
                <h1>AURA COIFFEUR</h1>
                <p style="font-size: 10px; color: #aaa; letter-spacing: 1px;">VIP CLOUD SYSTEM</p>
            </div>
            <div><span>● BULUT CANLI</span></div>
        </div>

        <div class="main-content">
            <!-- YENİ RANDEVU EKLEME ALANI -->
            <div class="premium-card">
                <h2>➕ Yeni Adisyon / Randevu Ekle</h2>
                <form id="appointment-form" onsubmit="saveToCloud(event)">
                    <div class="form-group">
                        <label>Müşteri Adı Soyadı</label>
                        <input type="text" id="app-name" placeholder="Örn: Eda Yılmaz" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>Telefon Numarası</label>
                        <input type="tel" id="app-phone" placeholder="Örn: 0532XXX" required>
                    </div>
                    <div class="form-group">
                        <label>Randevu Tarihi & Saati</label>
                        <input type="datetime-local" id="app-date" required>
                    </div>
                    <div class="form-group">
                        <label>Yapılacak İşlem</label>
                        <select id="app-service">
                            <option value="Ombre">Ombre</option>
                            <option value="Sombre">Sombre</option>
                            <option value="Saç Kesimi">Saç Kesimi</option>
                            <option value="Cila">Cila</option>
                            <option value="Keratin">Keratin</option>
                            <option value="Dip Boya">Dip Boya</option>
                            <option value="Komple Açma Boyama">Komple Açma Boyama</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Hizmet Tutarı (₺)</label>
                        <input type="number" id="app-price" placeholder="Tutar girin" required>
                    </div>
                    <button type="submit" class="gold-btn">BULUTA GÜVENLE KAYDET</button>
                </form>
            </div>

            <!-- GÜNCEL LİSTE -->
            <div class="premium-card">
                <h2>📅 Güncel Randevu Listesi</h2>
                <div class="table-responsive">
                    <table class="luxury-table">
                        <thead>
                            <tr>
                                <th>Müşteri</th>
                                <th>Zamanlama</th>
                                <th>İşlem</th>
                                <th>Ücret</th>
                                <th>Yönetim</th>
                            </tr>
                        </thead>
                        <tbody id="live-list-body">
                            <!-- Veriler buraya akacak -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // SENİN PROJENE AİT DOĞRULANMIŞ HESAP BİLGİLERİ
        const firebaseConfig = {
            apiKey: "AIzaSyCLxArUDt5KL7Yi6JgLBjRy14do",
            authDomain: "aura-coiffeur.firebaseapp.com",
            databaseURL: "https://aura-coiffeur-default-rtdb.firebaseio.com",
            projectId: "aura-coiffeur",
            storageBucket: "aura-coiffeur.firebasestorage.app",
            messagingSenderId: "227131085890",
            appId: "1:227131085890:web:902ae7ee362503a6"
        };

        // Bağlantıyı Başlat
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Sayfa açıldığı an Google Bulutundan verileri canlı dinle
        database.ref("appointments").on("value", (snapshot) => {
            const listBody = document.getElementById("live-list-body");
            listBody.innerHTML = "";
            
            if(!snapshot.exists()) {
                listBody.innerHTML = `<tr><td colspan="5" class="empty-text">Kayıtlı VIP Randevusu Bulunmamaktadır.</td></tr>`;
                return;
            }

            snapshot.forEach((childSnapshot) => {
                const id = childSnapshot.key;
                const data = childSnapshot.val();
                
                // Tarih formatını temizle
                const cleanDate = data.date ? data.date.replace('T', ' ') : '--';
                const cleanPrice = data.price ? parseFloat(data.price).toLocaleString('tr-TR') : '0';

                const row = `<tr>
                    <td><b>${data.name}</b><br><span style="font-size:11px; color:#aaa;">${data.phone}</span></td>
                    <td>${cleanDate}</td>
                    <td class="gold-text">${data.service}</td>
                    <td><b>₺${cleanPrice}</b></td>
                    <td>
                        <button class="whatsapp-btn" onclick="sendWhatsApp('${data.name}', '${data.phone}', '${cleanDate}', '${data.service}', '${cleanPrice}')"><i class="fab fa-whatsapp"></i></button>
                        <button class="delete-btn" onclick="deleteFromCloud('${id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
                listBody.innerHTML += row;
            });
        });

        // Veri Kaydetme Fonksiyonu
        function saveToCloud(event) {
            event.preventDefault();
            
            const name = document.getElementById("app-name").value.trim();
            const phone = document.getElementById("app-phone").value.trim();
            const date = document.getElementById("app-date").value;
            const service = document.getElementById("app-service").value;
            const price = parseFloat(document.getElementById("app-price").value);

            const newId = Date.now().toString();

            database.ref("appointments/" + newId).set({
                name: name,
                phone: phone,
                date: date,
                service: service,
                price: price
            }).then(() => {
                alert("Randevu Google Bulutuna Kaydedildi!");
                document.getElementById("appointment-form").reset();
            }).catch((err) => {
                alert("Hata: Veritabanı kurallarınız (Rules) kilitli olabilir!");
                console.error(err);
            });
        }

        // Veri Silme Fonksiyonu
        function deleteFromCloud(id) {
            if(confirm("Bu randevuyu silmek istediğinize emin misiniz?")) {
                database.ref("appointments/" + id).remove();
            }
        }

        // WhatsApp Hatırlatıcı Açıcı
        function sendWhatsApp(name, phone, date, service, price) {
            const msg = `Sayın *${name}*, Aura Coiffeur'den rezerve ettiğiniz *${date}* tarihli *${service}* randevunuz onaylanmıştır. Tutar: *₺${price}*. Güzel günler dileriz. ✨`;
            let cleanPhone = phone.replace(/\s+/g, '').replace(/[^0-9]/g, '');
            if (cleanPhone.startsWith('0')) cleanPhone = '90' + cleanPhone.substring(1);
            window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
