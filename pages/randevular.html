<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Randevular | Aura Coiffeur</title>

<link rel="stylesheet" href="../style.css">

<style>

body{
background:#f8f6f4;
font-family:Arial,sans-serif;
padding:20px;
}

h1{
text-align:center;
color:#b67c8a;
margin-bottom:30px;
}

.topButton{
display:block;
width:100%;
padding:15px;
border:none;
background:#b67c8a;
color:white;
border-radius:15px;
font-size:18px;
margin-bottom:20px;
}

.card{

background:white;

padding:20px;

border-radius:20px;

margin-bottom:15px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.time{

font-size:20px;

font-weight:bold;

color:#b67c8a;

}

.name{

font-size:18px;

margin-top:8px;

}

.service{

color:#666;

margin-top:5px;

}

.status{

margin-top:15px;

display:flex;

gap:10px;

}

button{

flex:1;

padding:10px;

border:none;

border-radius:10px;

}

.ok{

background:#95c78d;

color:white;

}

.edit{

background:#f3c483;

}

.delete{

background:#e68c8c;

color:white;

}

</style>

</head>

<body>

<h1>Aura Coiffeur</h1>

<button class="topButton">

➕ Yeni Randevu

</button>

<div class="card">

<div class="time">

09:00

</div>

<div class="name">

Ayşe Yılmaz

</div>

<div class="service">

Balyaj + Bakım

</div>

<div class="status">

<button class="ok">

Tamamlandı

</button>

<button class="edit">

Düzenle

</button>

<button class="delete">

Sil

</button>

</div>

</div>

<div class="card">

<div class="time">

11:30

</div>

<div class="name">

Elif Kaya

</div>

<div class="service">

Kesim + Fön

</div>

<div class="status">

<button class="ok">

Tamamlandı

</button>

<button class="edit">

Düzenle

</button>

<button class="delete">

Sil

</button>

</div>

</div>

</body>

</html>
