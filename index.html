<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA COIFFEUR - Premium Panel</title>
    <!-- Google Fonts ve FontAwesome (Lüks Yazı Tipleri ve İkonlar) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* GENEL AYARLAR */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0b0b0b;
            background-image: radial-gradient(circle at 50% -20%, #1a1510, #0b0b0b);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* GİRİŞ EKRANI LÜKS TASARIM */
        .login-container {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: rgba(15, 15, 15, 0.75);
            border: 1px solid rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(212, 175, 55, 0.1);
        }

        .brand-title {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: #d4af37;
            letter-spacing: 7px;
            line-height: 1;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .brand-subtitle {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: #ffffff;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .expert-system-text {
            font-size: 0.75rem;
            color: #8a8a8a;
            letter-spacing: 3px;
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        /* INPUT ALANLARI */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #d4af37;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(25, 25, 25, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #d4af37;
            background: rgba(30, 26, 20, 0.6);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }

        /* LÜKS BUTON */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #b89327, #e7c767);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.5);
        }
    </style>
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="login-screen" class="login-container">
        <div class="login-box">
            <h1 class="brand-title">AURA</h1>
            <h2 class="brand-subtitle">COIFFEUR PREMIUM</h2>
            <p class="expert-system-text">LUXURY EXPERT SYSTEM</p>
            <form id="login-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Kullanıcı Adı" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Şifre" required>
                </div>
                <button type="submit" class="btn-login">GİRİŞ YAP</button>
            </form>
        </div>
    </div>

    <!-- ANA PANEL (Giriş Başarılı Olunca Görünecek Geçici Alan) -->
    <div id="main-panel" style="display: none; text-align: center; padding: 20px;">
        <h1 style="color: #d4af37; font-family: 'Cinzel', serif; letter-spacing: 3px; margin-bottom: 15px;">AURA COIFFEUR</h1>
        <p style="color: #fff; font-size: 1.1rem;">Premium Yönetim Paneline Başarıyla Giriş Yapıldı!</p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loginForm = document.getElementById("login-form");
            
            if (loginForm) {
                loginForm.addEventListener("submit", (e) => {
                    e.preventDefault();
                    
                    const userInp = document.getElementById("username").value;
                    const passInp = document.getElementById("password").value;
                    
                    if (userInp === "admin" && passInp === "1234") {
                        document.getElementById("login-screen").style.display = "none";
                        document.getElementById("main-panel").style.display = "block";
                        alert("Sisteme Başarıyla Giriş Yapıldı!");
                    } else {
                        alert("Hatalı Kullanıcı Adı veya Şifre! Lütfen tekrar deneyin.");
                    }
                });
            }
        });
    </script>
</body>
</html>
